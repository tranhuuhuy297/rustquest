<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="RustQuest">
  <defs>
    <linearGradient id="rq-hex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF7A45"/>
      <stop offset="1" stop-color="#C8451B"/>
    </linearGradient>
  </defs>

  <!-- dark rounded tile: keeps the icon legible on light browser chrome -->
  <rect x="1.5" y="1.5" width="45" height="45" rx="11.5" fill="#1B1612"/>

  <!-- molten hexagon, line style (bold enough to read at 16px) -->
  <path d="M24 6 39 14.5V31.5L24 40 9 31.5V14.5L24 6Z"
        fill="none" stroke="url(#rq-hex)" stroke-width="3.1" stroke-linejoin="round"/>

  <!-- crab: bold solid silhouette (amber) so it reads small; eyes punched out of the dark tile -->
  <g stroke="#F2A65A" stroke-width="2.7" stroke-linecap="round" fill="none">
    <!-- claws -->
    <path d="M17 27c-4.6 0-7-2.3-6.4-6.4"/>
    <path d="M31 27c4.6 0 7-2.3 6.4-6.4"/>
    <!-- legs -->
    <path d="M19.5 30.5 16 33.8"/>
    <path d="M28.5 30.5 32 33.8"/>
  </g>
  <!-- body -->
  <ellipse cx="24" cy="27" rx="7.4" ry="5.4" fill="#F2A65A"/>
  <!-- eyes (negative space) -->
  <circle cx="21" cy="25.4" r="1.5" fill="#1B1612"/>
  <circle cx="27" cy="25.4" r="1.5" fill="#1B1612"/>
</svg>
